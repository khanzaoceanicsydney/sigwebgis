<script>
    // ==================== NAVIGASI 3 HALAMAN ====================
    const homePage = document.getElementById('homePage');
    const mapPage = document.getElementById('mapPage');
    const sourcePage = document.getElementById('sourcePage');

    const navHome = document.getElementById('navHomeBtn');
    const navMap = document.getElementById('navMapBtn');
    const navSource = document.getElementById('navSourceBtn');

    const footerHome = document.getElementById('footerHomeBtn');
    const footerMap = document.getElementById('footerMapBtn');
    const footerSource = document.getElementById('footerSourceBtn');
    const exploreBtn = document.getElementById('exploreMapBtn');

    function setActiveButton(active) {
        [navHome, navMap, navSource].forEach(btn => {
            btn.classList.remove('bg-emerald-600', 'text-white');
            btn.classList.add('bg-gray-200', 'text-gray-700');
        });

        active.classList.remove('bg-gray-200', 'text-gray-700');
        active.classList.add('bg-emerald-600', 'text-white');
    }

    function showHome() {
        homePage.classList.add('active');
        mapPage.classList.remove('active');
        sourcePage.classList.remove('active');
        setActiveButton(navHome);
    }

    function showMap() {
        homePage.classList.remove('active');
        mapPage.classList.add('active');
        sourcePage.classList.remove('active');
        setActiveButton(navMap);

        setTimeout(() => {
            if (window.mapInstance) window.mapInstance.invalidateSize();
            if (!window.mapInited) initMap();
            if (!window.chartInited) initChart();
        }, 100);
    }

    function showSource() {
        homePage.classList.remove('active');
        mapPage.classList.remove('active');
        sourcePage.classList.add('active');
        setActiveButton(navSource);
    }

    navHome.addEventListener('click', showHome);
    navMap.addEventListener('click', showMap);
    navSource.addEventListener('click', showSource);

    footerHome.addEventListener('click', showHome);
    footerMap.addEventListener('click', showMap);
    footerSource.addEventListener('click', showSource);

    exploreBtn.addEventListener('click', showMap);

    // ==================== MAP ====================

    let mapInited = false;
    let chartInited = false;

    function initMap() {

        if (mapInited) return;

        const map = L.map('map').setView([-8.6705, 115.2126], 11);
        window.mapInstance = map;

        // BASEMAP
        const osm = L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap'
            }
        ).addTo(map);

        const satellite = L.tileLayer(
            'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
            {
                attribution: '© Google Satellite'
            }
        );

        // STYLE
        function pointStyle(color) {
            return {
                radius: 6,
                fillColor: color,
                color: "#fff",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.9
            };
        }

        function polygonStyle(color) {
            return {
                color: color,
                weight: 2,
                fillOpacity: 0.5
            };
        }

        // POPUP
        function popupContent(properties) {
            let content =
                `<div style="font-family:DM Sans;min-width:200px;">
                    <div style="background:#059669;color:white;padding:8px;border-radius:8px 8px 0 0;margin:-12px -12px 10px -12px;">
                        <strong>📌 Informasi</strong>
                    </div>`;

            for (let key in properties) {
                content += `
                    <div style="margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee;">
                        <strong>${key}</strong><br>${properties[key]}
                    </div>
                `;
            }

            content += `</div>`;

            return content;
        }

        // LOAD GEOJSON
        async function loadGeoJSON(file, color, isPolygon = false) {

            const response = await fetch(file);
            const data = await response.json();

            return L.geoJSON(data, {

                style: isPolygon ? polygonStyle(color) : undefined,

                pointToLayer: function(feature, latlng) {
                    return L.circleMarker(latlng, pointStyle(color));
                },

                onEachFeature: function(feature, layer) {
                    if (feature.properties) {
                        layer.bindPopup(
                            popupContent(feature.properties),
                            {
                                className: 'custom-popup'
                            }
                        );
                    }
                }

            });
        }

        Promise.all([

            loadGeoJSON('PENDIDIKAN.geojson', '#3b82f6'),
            loadGeoJSON('RS.geojson', '#ef4444'),
            loadGeoJSON('NIAGA.geojson', '#f97316'),
            loadGeoJSON('PERMUKIMAN.geojson', '#eab308', true),
            loadGeoJSON('SARANA IBADAH.geojson', '#a855f7'),
            loadGeoJSON('CAGAR BUDAYA.geojson', '#6b7280'),
            loadGeoJSON('PEMERINTAHAN.geojson', '#b8860b')

        ]).then(([pendidikan, rs, niaga, permukiman, ibadah, budaya, pemerintahan]) => {

            pendidikan.addTo(map);

            const overlayMaps = {
                "Pendidikan": pendidikan,
                "Rumah Sakit": rs,
                "Niaga": niaga,
                "Permukiman": permukiman,
                "Sarana Ibadah": ibadah,
                "Cagar Budaya": budaya,
                "Pemerintahan": pemerintahan
            };

            L.control.layers(
                {
                    "OpenStreetMap": osm,
                    "Google Satellite": satellite
                },
                overlayMaps
            ).addTo(map);

        });

        // ==================== LEGENDA ====================

        const legend = L.control({ position: 'bottomleft' });

        legend.onAdd = function () {

            const div = L.DomUtil.create('div');

            div.innerHTML = `
                <div style="
                    background:white;
                    padding:12px 15px;
                    border-radius:10px;
                    box-shadow:0 0 15px rgba(0,0,0,0.2);
                    font-size:12px;
                    min-width:170px;
                ">
                    <h4 style="
                        margin:0 0 10px 0;
                        font-weight:bold;
                        border-bottom:2px solid #059669;
                        padding-bottom:5px;
                    ">
                        Legenda
                    </h4>

                    <div style="margin-bottom:6px;">
                        <span style="display:inline-block;width:12px;height:12px;background:#3b82f6;border-radius:50%;margin-right:8px;"></span>
                        Pendidikan
                    </div>

                    <div style="margin-bottom:6px;">
                        <span style="display:inline-block;width:12px;height:12px;background:#ef4444;border-radius:50%;margin-right:8px;"></span>
                        Rumah Sakit
                    </div>

                    <div style="margin-bottom:6px;">
                        <span style="display:inline-block;width:12px;height:12px;background:#f97316;border-radius:50%;margin-right:8px;"></span>
                        Niaga
                    </div>

                    <div style="margin-bottom:6px;">
                        <span style="display:inline-block;width:12px;height:12px;background:#eab308;border-radius:50%;margin-right:8px;"></span>
                        Permukiman
                    </div>

                    <div style="margin-bottom:6px;">
                        <span style="display:inline-block;width:12px;height:12px;background:#a855f7;border-radius:50%;margin-right:8px;"></span>
                        Sarana Ibadah
                    </div>

                    <div style="margin-bottom:6px;">
                        <span style="display:inline-block;width:12px;height:12px;background:#6b7280;border-radius:50%;margin-right:8px;"></span>
                        Cagar Budaya
                    </div>

                    <div>
                        <span style="display:inline-block;width:12px;height:12px;background:#b8860b;border-radius:50%;margin-right:8px;"></span>
                        Pemerintahan
                    </div>
                </div>
            `;

            return div;
        };

        legend.addTo(map);

        mapInited = true;
    }

    // ==================== CHART ====================

    function initChart() {

        if (chartInited) return;

        const ctx = document.getElementById('statsChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',

            data: {
                labels: [
                    'Pendidikan',
                    'Rumah Sakit',
                    'Niaga',
                    'Permukiman',
                    'Sarana Ibadah',
                    'Cagar Budaya',
                    'Pemerintahan'
                ],

                datasets: [{
                    label: 'Jumlah',

                    data: [155, 28, 17, 2429, 296, 15, 50],

                    backgroundColor: [
                        '#3b82f6',
                        '#ef4444',
                        '#f97316',
                        '#eab308',
                        '#a855f7',
                        '#6b7280',
                        '#b8860b'
                    ],

                    borderRadius: 8
                }]
            },

            options: {
                responsive: true
            }
        });

        chartInited = true;
    }
</script>
